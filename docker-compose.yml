services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sopilot
      POSTGRES_PASSWORD: sopilot
      POSTGRES_DB: sopilot
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - sopilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sopilot"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  sopilot_pgdata:
